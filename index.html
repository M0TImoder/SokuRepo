<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokuRepo</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            padding: 1rem 2rem;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            z-index: 10;
        }

        .brand-title {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
        }

        main {
            flex-grow: 1;
            background-color: #f4f4f4;

            background-image:
                linear-gradient(to right, rgba(0,0,0,.7) 0 0),
                linear-gradient(to bottom, rgba(0,0,0,.7) 0 0),

                repeating-linear-gradient(to right,
                rgba(0,0,0,.18) 0, rgba(0,0,0,.18) 2px,
                transparent 2px, transparent 100px),
                repeating-linear-gradient(to bottom,
                rgba(0,0,0,.18) 0, rgba(0,0,0,.18) 2px,
                transparent 2px, transparent 100px),

                repeating-linear-gradient(to right,
                rgba(0,0,0,.08) 0, rgba(0,0,0,.08) 1px,
                transparent 1px, transparent 20px),
                repeating-linear-gradient(to bottom,
                rgba(0,0,0,.08) 0, rgba(0,0,0,.08) 1px,
                transparent 1px, transparent 20px);

            background-size:
                2px 100%,
                100% 2px,
                100px 100px,
                100px 100px,
                20px 20px,
                20px 20px;

            background-position:
                center center,
                center center,
                center center,
                center center,
                center center,
                center center;

            background-repeat:
                no-repeat,
                no-repeat,
                repeat,
                repeat,
                repeat,
                repeat;
        }
    </style>
</head>
<body>
    
    <header>
        <h1 class="brand-title">SokuRepo</h1>
    </header>

    <main id="palette-grid">
    </main>

</body>
</html>
